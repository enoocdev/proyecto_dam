version: '3.8'

services:
  # Servicio de base de datos PostgreSQL
  db:
    image: postgres:16
    restart: always
    volumes:
      # Volumen persistente para conservar los datos al reiniciar
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Servicio Redis necesario para Django Channels y WebSockets
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # Servicio del backend Django con Daphne como servidor ASGI
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: >
      sh -c "
        echo 'Esperando a PostgreSQL...' &&
        while ! python -c 'import psycopg2; psycopg2.connect(host=\"db\", port=5432, dbname=\"monitor_db\", user=\"postgres\", password=\"abc123.\")' 2>/dev/null; do
          echo 'PostgreSQL no disponible, reintentando en 2s...' && sleep 2;
        done &&
        echo 'PostgreSQL listo!' &&
        python manage.py makemigrations users &&
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py createsuperuser --noinput || true &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Apunta al servicio Redis del compose
      - REDIS_HOST=redis
    depends_on:
      db:
        # Espera a que PostgreSQL acepte conexiones
        condition: service_healthy
      redis:
        condition: service_started

# Volumen persistente para la base de datos
volumes:
  postgres_data: