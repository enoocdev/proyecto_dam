version: '3.8'

services:
  # --- SERVICIO 1: BASE DE DATOS (PostgreSQL) ---
  db:
    image: postgres:16
    restart: always
    volumes:
      # Esto crea un "disco duro" virtual para que no pierdas los datos al apagar
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env  # Lee tu archivo .env para saber usuario y contraseña
    ports:
      - "5432:5432" # Te permite conectar DBeaver o TablePlus desde fuera
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  # --- SERVICIO 2: REDIS (necesario para Django Channels) ---
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # --- SERVICIO 3: TU APP DJANGO ---
  backend:
    build:
      context: .              # La "cámara" mira desde la raíz del proyecto
      dockerfile: docker/Dockerfile  # Busca el archivo de instrucciones dentro de la carpeta docker
    command: >
      sh -c "
        echo 'Esperando a PostgreSQL...' &&
        while ! python -c 'import psycopg2; psycopg2.connect(host=\"db\", port=5432, dbname=\"monitor_db\", user=\"postgres\", password=\"abc123.\")' 2>/dev/null; do
          echo 'PostgreSQL no disponible, reintentando en 2s...' && sleep 2;
        done &&
        echo 'PostgreSQL listo!' &&
        python manage.py makemigrations users &&
        python manage.py makemigrations &&
        python manage.py migrate &&
        python manage.py createsuperuser --noinput || true &&
        daphne -b 0.0.0.0 -p 8000 config.asgi:application
      "
    volumes:
      - .:/app                # "Espejo" de tu código en tiempo real
    ports:
      - "8000:8000"
    env_file:
      - .env                  # Carga las mismas variables (SECRET_KEY, DEBUG, etc)
    environment:
      - REDIS_HOST=redis      # Apunta al servicio Redis del compose
    depends_on:
      db:
        condition: service_healthy  # Espera a que PostgreSQL acepte conexiones
      redis:
        condition: service_started  # Espera a que Redis esté listo

# Definición del volumen persistente para la DB
volumes:
  postgres_data: