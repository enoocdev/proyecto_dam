name: CI/CD NetManagement

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Ejecutar despliegue remoto"
        required: false
        default: false
        type: boolean
      target_environment:
        description: "Entorno de despliegue"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  backend-ci:
    name: Backend CI (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: netmanagement_test
          POSTGRES_USER: netmanagement
          POSTGRES_PASSWORD: netmanagement
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U netmanagement -d netmanagement_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      POSTGRES_DB: netmanagement_test
      POSTGRES_USER: netmanagement
      POSTGRES_PASSWORD: netmanagement
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validación Django
        run: |
          python manage.py check

      - name: Ejecutar tests backend
        run: |
          python manage.py test

  frontend-ci:
    name: Frontend CI (Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker-validate:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar docker-compose de producción
        working-directory: produccion
        env:
          POSTGRES_DB: ci_db
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_pass
          SECRET_KEY: ci-secret-key
          DEBUG: "False"
          ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost
          DJANGO_SUPERUSER_USERNAME: admin
          DJANGO_SUPERUSER_PASSWORD: admin
          DJANGO_SUPERUSER_EMAIL: admin@example.com
          DOMAIN: localhost
        run: docker compose -f docker-compose.prod.yml config >/dev/null

      - name: Build imagen backend de producción
        run: docker build -f backend/Dockerfile.prod backend

  deploy:
    name: CD Deploy (SSH)
    runs-on: ubuntu-latest
    needs: [docker-validate]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy == true)
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_environment || 'staging' }}

    steps:
      - name: Desplegar en servidor remoto
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --tags
            git checkout main
            git pull --ff-only
            chmod +x produccion/deploy.sh
            ./produccion/deploy.sh
