name: Build NetManagement Installer

on:
  # Dispara la compilacion al crear una etiqueta de version (v1.0, v1.2.3, etc.)
  push:
    tags:
      - "v*"
  # Permite disparar la compilacion manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:

jobs:
  # Job Windows: genera NetManagement-Installer.exe
  build-windows:
    name: Build – Windows
    runs-on: windows-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del cliente + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r client/requirements.txt
        shell: pwsh

      - name: Compilar ejecutable Windows
        run: |
          pyinstaller client/build/netmanagement_installer.spec `
            --distpath client/build/dist/windows `
            --workpath client/build/work/windows `
            --noconfirm
        shell: pwsh

      - name: Subir artefacto Windows
        uses: actions/upload-artifact@v4
        with:
          name: NetManagement-Installer-windows
          path: client/build/dist/windows/NetManagement-Installer.exe
          if-no-files-found: error

  # Job Linux: genera NetManagement-Installer (ELF, sin extension)
  build-linux:
    name: Build – Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias del sistema (mss necesita X11 headers)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Instalar dependencias del cliente + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r client/requirements.txt

      - name: Compilar ejecutable Linux
        run: |
          pyinstaller client/build/netmanagement_installer.spec \
            --distpath client/build/dist/linux \
            --workpath client/build/work/linux \
            --noconfirm

      - name: Subir artefacto Linux
        uses: actions/upload-artifact@v4
        with:
          name: NetManagement-Installer-linux
          path: client/build/dist/linux/NetManagement-Installer
          if-no-files-found: error

  # Job Release: crea un Release de GitHub y adjunta los dos binarios
  # Solo se ejecuta cuando el trigger es un tag (v*)
  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    # Solo crear release cuando el evento es un push de tag
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Descargar artefacto Windows
        uses: actions/download-artifact@v4
        with:
          name: NetManagement-Installer-windows
          path: dist/

      - name: Descargar artefacto Linux
        uses: actions/download-artifact@v4
        with:
          name: NetManagement-Installer-linux
          path: dist/

      - name: Renombrar binarios con sufijo de plataforma
        run: |
          mv dist/NetManagement-Installer.exe  dist/NetManagement-Installer-windows.exe
          mv dist/NetManagement-Installer      dist/NetManagement-Installer-linux
          chmod +x dist/NetManagement-Installer-linux

      - name: Crear Release y adjuntar binarios
        uses: softprops/action-gh-release@v2
        with:
          name: "NetManagement ${{ github.ref_name }}"
          body: |
            ## NetManagement Installer ${{ github.ref_name }}

            Descarga el instalador correspondiente a tu sistema operativo:

            | Sistema | Archivo |
            |---------|---------|
            | Windows | `NetManagement-Installer-windows.exe` |
            | Linux   | `NetManagement-Installer-linux` |

            ### Instrucciones
            **Windows:** Ejecutar como Administrador (el UAC lo solicitará automáticamente).
            **Linux:** `sudo ./NetManagement-Installer-linux`

            El instalador creará el entorno virtual, instalará las dependencias
            y registrará el agente como servicio del sistema (Task Scheduler en Windows,
            systemd en Linux).
          files: |
            dist/NetManagement-Installer-windows.exe
            dist/NetManagement-Installer-linux
          draft: false
          prerelease: false
