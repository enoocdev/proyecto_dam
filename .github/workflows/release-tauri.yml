name: Release Tauri App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ─── Desktop: Linux + Windows ────────────────────────────────────────────────
  release-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
            args: ''
          - os: windows
            runner: windows-latest
            args: ''

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Net Management ${{ github.ref_name }}'
          releaseBody: |
            ## Net Management ${{ github.ref_name }}

            ### Instaladores disponibles
            - **Windows**: `.exe` (NSIS installer) / `.msi`
            - **Linux**: `.deb` (Debian/Ubuntu) / `.AppImage` (portable)
            - **Android**: `.apk`

            > Consulta el [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) para ver los cambios de esta versión.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  #  Android 
  release-android:
    permissions:
      contents: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build tools
        run: |
          sdkmanager "ndk;27.0.12077973" "build-tools;36.0.0" "platforms;android-36"

      - name: Setup Rust (stable) + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './frontend/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install

      - name: Initialize Tauri Android project
        working-directory: frontend
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: bunx tauri android init

        - name: Patch MainActivity.java to avoid fullscreen
          run: |
            MAINACT=frontend/src-tauri/gen/android/app/src/main/java/com/netmanagement/app/MainActivity.java
            mkdir -p "$(dirname "$MAINACT")"
            cat > "$MAINACT" <<'EOF'
  package com.netmanagement.app;

  import android.os.Bundle;
  import android.view.View;
  import androidx.appcompat.app.AppCompatActivity;

  public class MainActivity extends AppCompatActivity {
      @Override
      protected void onCreate(Bundle savedInstanceState) {
          super.onCreate(savedInstanceState);
          // Forzar que la barra de estado y navegación estén visibles
          getWindow().getDecorView().setSystemUiVisibility(View.SYSTEM_UI_FLAG_VISIBLE);
      }
  }
  EOF

      - name: Patch Android SDK versions to API 36 (Android 16)
        run: |
          GRADLE=frontend/src-tauri/gen/android/app/build.gradle.kts
          if [ -f "$GRADLE" ]; then
            sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' "$GRADLE"
            sed -i 's/targetSdk = [0-9]*/targetSdk = 36/' "$GRADLE"
            sed -i 's/minSdk = [0-9]*/minSdk = 24/' "$GRADLE"
            echo "✓ build.gradle.kts parcheado"
            grep -E 'compileSdk|targetSdk|minSdk' "$GRADLE"
          fi

      # Firma con keystore de produccion si existen los secrets,
      # si no genera un APK de debug sin firma (util para pruebas)
      - name: Build Android APK
        working-directory: frontend
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
          TAURI_SIGNING_ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          TAURI_SIGNING_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          TAURI_SIGNING_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$TAURI_SIGNING_ANDROID_KEYSTORE" ]; then
            echo "$TAURI_SIGNING_ANDROID_KEYSTORE" | base64 -d > /tmp/keystore.jks
            export TAURI_SIGNING_ANDROID_KEYSTORE=/tmp/keystore.jks
            bunx tauri android build --apk
          else
            echo "⚠️  Sin keystore de producción — generando APK de debug"
            bunx tauri android build --apk --debug
          fi

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
